name: Restock Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 실행 (GitHub 사정에 따라 더 늦어질 수 있음)
  workflow_dispatch:          # Actions 탭에서 수동 실행(테스트)용 버튼

# 봇이 상태 파일(restock_state.json)을 저장소에 커밋할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

# 실행이 겹쳐서 동시에 커밋하는 일을 방지
concurrency:
  group: restock-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Playwright 브라우저 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 재고 확인
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python restock_bot.py

      - name: 상태 저장 (변동 있을 때만 커밋)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add restock_state.json
          if git diff --staged --quiet; then
            echo "변동 없음 - 커밋 생략"
          else
            git commit -m "상태 업데이트 [skip ci]"
            git push || (git pull --rebase && git push)
          fi
